monitor = , preferred, auto, 1
monitor = eDP-1, preferred, auto, 1.2

xwayland {
  force_zero_scaling = true
}

exec-once = waybar
exec-once = wl-clip-persist --clipboard regular
exec-once = walker --gapplication-service"
exec-once = hyprsunset
# exec-once = systemctl --user start sunshine # lol
# exec-once = steam -silent

env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
# env = SDL_VIDEODRIVER,wayland,x11,windows
env = CLUTTER_BACKEND,wayland

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_DATA_DIRS,/usr/local/share:/usr/share:/home/s/.local/share

env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt6ct

env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland

# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = LIBVA_DRIVER_NAME,nvidia
# env = VDPAU_DRIVER,nvidia

env = HYPRCURSOR_THEME,macos-tahoe-cursor
env = HYPRCURSOR_SIZE,28
env = XCURSOR_THEME,macos-tahoe-cursor
env = XCURSOR_SIZE,28

env = TERMINAL,ghostty
env = TERM,ghostty

general {
    gaps_in = 2
    gaps_out = 4

    border_size = 2

    col.active_border = rgba(000000ff)
    col.inactive_border = rgba(80808080)

    resize_on_border = true

    allow_tearing = true

    layout = scrolling

    snap {
        enabled = true
        respect_gaps = true
    }
}

decoration {
    rounding = 0
    rounding_power = 4

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 200
        render_power = 3
        offset = 0 50
        color = rgba(00000044)
        color_inactive = rgba(00000022)
        scale = 0.9
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,     1, 2, easeOutQuint
    animation = windowsIn,  1, 2, easeOutQuint, popin 95%
    animation = windowsOut, 1, 2, easeOutQuint, popin 99%
    animation = workspaces, 1, 3, easeOutQuint, slidevert
    animation = fade,       1, 1, almostLinear
    animation = layers,     1, 2, easeOutQuint, popin 98%
}

layout {
    # single_window_aspect_ratio = 16 10
    # single_window_aspect_ratio_tolerance = 0
}

dwindle {
    pseudotile = true
    force_split = 2
    preserve_split = true
}

scrolling {
    # wrap_focus = false
    # wrap_swapcol = false
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgb(cccccc)
}

input {
    kb_layout = us
    kb_options = ctrl:nocaps, altwin:swap_alt_win
    repeat_rate = 30
    repeat_delay = 180
    follow_mouse = 2
    sensitivity = 0
    # accel_profile = "flat"
    natural_scroll = true

    touchpad {
        natural_scroll = true
        tap-to-click = false
    }
}

gesture = 3, vertical, workspace

binds {
    scroll_event_delay = 0
}

render {
    direct_scanout = 1
}

cursor {
    hide_on_key_press = true
    no_hardware_cursors = 1
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

bind = SUPER, Return, exec, ghostty
bind = SUPER, T, exec, ghostty
bind = SUPER, W, killactive
bind = SUPER, Q, forcekillactive
bind = SUPER SHIFT, Q, exit
bind = SUPER, E, exec, nautilus --new-window
bind = SUPER, B, exec, firefox
bind = SUPER, Y, exec, firefox --new-window https://www.youtube.com/feed/subscriptions
bind = SUPER, F, fullscreen
bind = SUPER SHIFT, F, togglefloating
bind = SUPER SHIFT, F, centerwindow
bind = SUPER, Space, exec, launch-walker
bind = SUPER, P, pseudo
bind = SUPER, R, layoutmsg, colresize +conf
bind = SUPER SHIFT, R, layoutmsg, colresize -conf
bind = SUPER SHIFT, D, exec, ~/.config/themes/toggle.sh

# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
# bind = SUPER SHIFT, left, movewindow, l
# bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, left, layoutmsg, swapcol l
bind = SUPER SHIFT, right, layoutmsg, swapcol r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d
bind = SUPER CTRL, left, resizeactive, -50 0
bind = SUPER CTRL, right, resizeactive, 50 0
bind = SUPER CTRL, up, resizeactive, 0 -50
bind = SUPER CTRL, down, resizeactive, 0 50

bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d
# bind = SUPER SHIFT, h, movewindow, l
# bind = SUPER SHIFT, l, movewindow, r
bind = SUPER SHIFT, h, layoutmsg, swapcol l
bind = SUPER SHIFT, l, layoutmsg, swapcol r
bind = SUPER SHIFT, k, movewindow, u
bind = SUPER SHIFT, j, movewindow, d
bind = SUPER CTRL, h, resizeactive, -50 0
bind = SUPER CTRL, l, resizeactive, 50 0
bind = SUPER CTRL, k, resizeactive, 0 -50
bind = SUPER CTRL, j, resizeactive, 0 50

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Move active window in to and out of columns
bind = SUPER, comma, movewindow, l
bind = SUPER, period, layoutmsg, promote focus r

# Scroll through existing workspaces with SUPER + scroll
bind = SUPER, mouse_down, workspace, e-1
bind = SUPER, mouse_up, workspace, e+1

# Move/resize windows with SUPER + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Zoom
bind = CTRL, mouse_up,   exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = CTRL, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
binde = SUPER, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = SUPER, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
gesture = 3, up,   mod: SUPER, cursorZoom, 1.5, mult
gesture = 3, down, mod: SUPER, cursorZoom, 0.75, mult

# Hyprpicker
bind = SUPER, I, exec, hyprpicker -a

# Hyprlock
bind = SUPER CTRL, q, exec, hyprlock

# Laptop multimedia keys for volume and LCD brightness
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && volume-osd
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume      @DEFAULT_AUDIO_SINK@ 5%- && volume-osd
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@   toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+ && brightness-osd
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- && brightness-osd

bindel = , Pause,       exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && volume-osd 
bindel = , Scroll_Lock, exec, wpctl set-volume      @DEFAULT_AUDIO_SINK@ 5%- && volume-osd

# Requires playerctl
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

windowrule {
    # Ignore maximize requests from all apps
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Steam
windowrule = match:class steam, match:title Friends List, float on, size 15% 50%
windowrule = match:class steam_app|gamescope, immediate on

windowrule {
    # Picture in Picture
    name = picture-in-picture
    match:title = Picture-in-Picture

    float = on
    pin = on
    keep_aspect_ratio = on
}

windowrule {
    name = quicklook-sushi
    match:class = org.gnome.NautilusPreviewer

    float = on
}

# Tearing
windowrule = match:class ^(cs2)$, immediate on
windowrule = match:title Valheim, immediate on

source = ~/.config/hypr/theme.conf

